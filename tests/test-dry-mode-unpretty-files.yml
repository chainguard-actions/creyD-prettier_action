name: Test dry mode with unpretty files exits with error
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up git config
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"

      - name: Create an unformatted JS file and commit it
        working-directory: ${{ github.workspace }}
        run: |
          # Write a poorly formatted JS file
          printf 'const x=1;const y=2;\n' > ugly.js
          git add ugly.js
          git commit -m "Add ugly JS file"

      - id: action
        uses: .
        with:
          dry: "true"
          prettier_options: "--write ugly.js"
          working_directory: ${{ github.workspace }}
          github_token: ${{ github.token }}
        continue-on-error: true

      - name: Assert action failed because files need formatting
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "Action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: Expected action to fail when unpretty files found in dry mode, but got: $OUTCOME"
            exit 1
          fi
          echo "PASS: Action correctly detected unpretty files in dry mode"
